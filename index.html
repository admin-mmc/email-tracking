<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Descadastro confirmado</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e5e5e5;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #edfaf4;
      border: 1px solid #b6ecd4;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .icon svg {
      width: 32px;
      height: 32px;
      stroke: #1d9e75;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #111;
      margin-bottom: 8px;
    }
    p {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
    }
    .hint {
      margin-top: 1.5rem;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>Descadastro confirmado</h1>
    <p>Você foi removido da nossa lista e não receberá mais nossos emails.</p>
    <p class="hint">Pode fechar esta página.</p>
  </div>
</body>
</html>
